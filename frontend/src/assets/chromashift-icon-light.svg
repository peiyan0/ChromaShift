<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .teal { fill: #0d9488; }
      .teal-dark { fill: #0f6e56; }
      .orange { fill: #ea580c; }
      .orange-dark { fill: #b84608; }
      .divider { stroke: #1c1917; stroke-width: 1.5px; opacity: 0.4; }
      .ring { fill: none; stroke: #0f6e56; stroke-width: 1px; opacity: 0.3; }
    </style>
  </defs>

  <!-- Background (optional, remove for transparent) -->
  <rect width="192" height="192" fill="#fcfbf9" rx="32"/>

  <!-- Icon -->
  <g transform="translate(96, 96)">
    <!-- Outer guide ring -->
    <circle class="ring" r="70"/>

    <!-- Left semi-circle: Teal -->
    <circle class="teal" cx="0" cy="0" r="55"/>

    <!-- Right semi-circle: Orange -->
    <path d="M 0 -55 L 0 55 A 55 55 0 0 1 0 -55" class="orange"/>

    <!-- Inner ring -->
    <circle class="ring" cx="0" cy="0" r="48" fill="none" stroke="#0f6e56" stroke-width="1px" opacity="0.4"/>

    <!-- Dividing line -->
    <line class="divider" x1="0" y1="-55" x2="0" y2="55"/>

    <!-- Center point -->
    <circle cx="0" cy="0" r="4" fill="#1c1917" opacity="0.5"/>

    <!-- Light catches -->
    <ellipse cx="-12" cy="-18" rx="14" ry="10" class="teal-dark" opacity="0.3"/>
    <ellipse cx="12" cy="-18" rx="14" ry="10" class="orange-dark" opacity="0.2"/>
  </g>
</svg>
